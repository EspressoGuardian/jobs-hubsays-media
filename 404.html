<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <meta name="robots" content="noindex,nofollow,noarchive" />
  <meta http-equiv="refresh" content="0; url=https://hubsays.com/" />
  <title>Archive | jobs.hubsays.media</title>
  <meta
    name="description"
    content="The jobs.hubsays.media beta is parked. Active public work now lives on hubsays.com and brendan-davies.dev."
  />
  <style>
    :root {
      --bg: #081417;
      --panel: rgba(12, 25, 29, 0.96);
      --line: rgba(116, 211, 255, 0.16);
      --text: #e8f1ef;
      --muted: #9cb9b5;
      --accent: #8ef0d6;
      --font-sans: "IBM Plex Sans", system-ui, sans-serif;
      --font-mono: "IBM Plex Mono", monospace;
    }
    * { box-sizing: border-box; }
    body {
      margin: 0;
      min-height: 100vh;
      display: grid;
      place-items: center;
      padding: 24px;
      color: var(--text);
      font-family: var(--font-sans);
      background: linear-gradient(180deg, #081417 0%, #091114 100%);
    }
    main {
      width: min(680px, 100%);
      padding: 28px;
      border: 1px solid var(--line);
      border-radius: 24px;
      background: var(--panel);
    }
    h1 {
      margin: 0;
      font-family: var(--font-mono);
      font-size: clamp(1.8rem, 4vw, 2.8rem);
    }
    p {
      color: var(--muted);
      line-height: 1.7;
    }
    .actions {
      display: flex;
      flex-wrap: wrap;
      gap: 12px;
      margin-top: 22px;
    }
    a {
      text-decoration: none;
      color: var(--text);
      border: 1px solid rgba(142, 240, 214, 0.24);
      background: rgba(142, 240, 214, 0.08);
      border-radius: 12px;
      min-height: 44px;
      padding: 0 16px;
      display: inline-flex;
      align-items: center;
    }
  </style>
</head>
<body>
  <main>
    <h1>This surface has been retired.</h1>
    <p>
      jobs.hubsays.media is no longer an active public product. You are being
      redirected to hubsays.com.
    </p>
    <div class="actions">
      <a href="https://hubsays.com/">Open hubsays.com</a>
      <a href="https://brendan-davies.dev/">Open brendan-davies.dev</a>
    </div>
  </main>
</body>
</html>
